name: CI

on:
  push:
    branches: [main, master, develop, "claude/**"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Unit tests (no Docker needed) ─────────────────────────────────────────
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.33.0"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Run unit tests
        run: pnpm test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore

  # ── End-to-end tests (full Docker stack) ──────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # compose.ci.yaml clears the dev bind-mounts (.:/app) that would hide
      # the .venv / node_modules baked into the sidecar and gui images.
      - name: Start application stack
        run: docker compose -f compose.yaml -f compose.ci.yaml up -d floci sidecar gui
        env:
          FLOCI_IMAGE: floci/floci:latest

      - name: Build test image
        run: docker compose -f compose.yaml -f compose.ci.yaml --profile test build test

      - name: Run e2e tests
        env:
          BASE_URL: http://gui:3000
        run: |
          docker compose -f compose.yaml -f compose.ci.yaml --profile test run --rm \
            -e BASE_URL=$BASE_URL \
            test sh -c '
              echo "Waiting for GUI...";
              until curl -sf http://gui:3000 > /dev/null 2>&1; do sleep 3; done;
              echo "Running e2e tests only";
              pnpm test:e2e
            '

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Tear down
        if: always()
        run: docker compose -f compose.yaml -f compose.ci.yaml down -v
