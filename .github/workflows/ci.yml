name: CI

on:
  push:
    branches: [main, master, develop, "claude/**"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Unit tests (no Docker needed) ─────────────────────────────────────────
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.33.0"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Run unit tests
        run: pnpm test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore

  # ── End-to-end tests (full Docker stack) ──────────────────────────────────
  # Playwright runs on the Actions runner and hits localhost:3000 (the gui
  # container's exposed port). This avoids Docker-in-Docker networking: no
  # container recreation on `docker compose run`, no gui hostname resolution,
  # and the wait loop targets the same URL that Playwright will use.
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.33.0"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      # compose.ci.yaml strips the dev bind-mounts so images run as built.
      - name: Start application stack
        run: docker compose -f compose.yaml -f compose.ci.yaml up -d floci sidecar gui
        env:
          FLOCI_IMAGE: floci/floci:latest

      - name: Wait for GUI
        run: |
          echo "Waiting for http://localhost:3000 (timeout 120s)..."
          timeout 120 bash -c 'until curl -sf http://localhost:3000 > /dev/null 2>&1; do sleep 3; done'
          echo "GUI ready"

      - name: Run e2e tests
        run: pnpm test:e2e
        env:
          CI: "true"
          BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Dump service logs on failure
        if: failure()
        run: docker compose -f compose.yaml -f compose.ci.yaml logs --tail=100

      - name: Tear down
        if: always()
        run: docker compose -f compose.yaml -f compose.ci.yaml down -v
