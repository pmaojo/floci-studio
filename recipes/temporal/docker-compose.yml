services:
  temporal:
    image: temporalio/auto-setup:1.24
    ports:
      - "${TEMPORAL_PORT}:7233"
    environment:
      - DB=sqlite
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:2.26.2
    ports:
      - "${TEMPORAL_UI_PORT}:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    depends_on:
      - temporal
    restart: unless-stopped
