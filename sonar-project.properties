sonar.projectKey=floci-studio
sonar.projectName=Floci Studio
sonar.projectVersion=0.1.0

# Sources
sonar.sources=src,mcp/floci_backend,mcp/tools,mcp/floci_mcp.py
sonar.tests=tests,.playwright-mcp

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/__pycache__/**,**/mcp/.venv/**,**/mcp/verify_mcp.py

# TypeScript / JavaScript
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Python
sonar.python.version=3.10

# Coverage
sonar.coverage.exclusions=**/tests/**,**/*.test.ts,**/*.spec.ts,**/playwright-mcp/**

# Encoding
sonar.sourceEncoding=UTF-8
