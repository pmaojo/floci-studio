services:
  floci:
    image: ${FLOCI_IMAGE:-floci/floci:latest}
    user: root
    ports:
      - "${FLOCI_PORT:-4566}:4566"
      - "${FLOCI_ELASTICACHE_PORTS:-6379-6399}:6379-6399"
      - "${FLOCI_RDS_PORTS:-7001-7099}:7001-7099"
    volumes:
      - "${FLOCI_DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock"
      - floci-data:/app/data
    environment:
      FLOCI_BASE_URL: ${FLOCI_PUBLIC_BASE_URL:-http://localhost:3000/aws}
      FLOCI_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      FLOCI_DEFAULT_ACCOUNT_ID: ${FLOCI_DEFAULT_ACCOUNT_ID:-000000000000}
      FLOCI_STORAGE_MODE: ${FLOCI_STORAGE_MODE:-persistent}
      FLOCI_STORAGE_PERSISTENT_PATH: /app/data
      FLOCI_AUTH_VALIDATE_SIGNATURES: ${FLOCI_AUTH_VALIDATE_SIGNATURES:-false}
      FLOCI_SERVICES_DOCKER_NETWORK: ${FLOCI_SERVICES_DOCKER_NETWORK:-floci-studio_floci}
    networks:
      - floci

  gui:
    build:
      context: .
    ports:
      - "${GUI_PORT:-3000}:3000"
    environment:
      VITE_FLOCI_ENDPOINT: ${VITE_FLOCI_ENDPOINT:-http://localhost:3000/aws}
      VITE_SIDECAR_URL: ${VITE_SIDECAR_URL:-/sidecar}
      VITE_REAL_DATA_ONLY: ${VITE_REAL_DATA_ONLY:-true}
      FLOCI_PROXY_TARGET: ${FLOCI_PROXY_TARGET:-http://floci:4566}
      SIDECAR_PROXY_TARGET: ${SIDECAR_PROXY_TARGET:-http://sidecar:4317}
      SIDECAR_TOKEN: ${SIDECAR_TOKEN:-}
    volumes:
      - .:/app
      - gui-node-modules:/app/node_modules
    depends_on:
      floci:
        condition: service_started
      sidecar:
        condition: service_started
    networks:
      - floci

  sidecar:
    build:
      context: .
      dockerfile: Dockerfile.sidecar
    ports:
      # Bind the sidecar publish port to the host loopback only — the GUI talks
      # to it through the Docker network. Expose externally by overriding
      # SIDECAR_BIND_HOST to 0.0.0.0 (and setting SIDECAR_TOKEN first).
      - "${SIDECAR_BIND_HOST:-127.0.0.1}:${SIDECAR_PORT:-4317}:4317"
    environment:
      SIDECAR_HOST: 0.0.0.0
      SIDECAR_PORT: 4317
      SIDECAR_TOKEN: ${SIDECAR_TOKEN:-}
      SIDECAR_ALLOWED_ORIGINS: ${SIDECAR_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL:-http://floci:4566}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      LAMBDA_DEFAULT_ROLE_ARN: ${LAMBDA_DEFAULT_ROLE_ARN:-arn:aws:iam::000000000000:role/lambda-role}
      SIDECAR_STATE_DIR: ${SIDECAR_STATE_DIR:-/app/.sidecar-state}
      KUBECONFIG: ${SIDECAR_KUBECONFIG:-}
    volumes:
      - .:/app
      - sidecar-node-modules:/app/node_modules
    depends_on:
      floci:
        condition: service_started
    networks:
      - floci

networks:
  floci:
    name: ${FLOCI_DOCKER_NETWORK_NAME:-floci-studio_floci}

volumes:
  floci-data:
  gui-node-modules:
  sidecar-node-modules:
